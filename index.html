<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Eren ❤️ Esma</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  background: black;
  overflow: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('foto.jpg') no-repeat center center/cover;
  filter: brightness(0.5);
  z-index: -1;
}

.container {
  position: relative;
  top: 20%;
  padding: 20px;
}

h1 {
  font-size: 50px;
}

p {
  font-size: 22px;
  max-width: 600px;
  margin: auto;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
}

#mesaj {
  display: none;
  margin-top: 20px;
  font-size: 24px;
  color: #ffd1dc;
}

.heart {
  position: absolute;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <h1>Eren ❤️ Esma</h1>

  <p>
    Sen benim huzur tarafımsın…<br>
    Gülüşün içimi toparlayan en sakin yer 💖
  </p>

  <button onclick="goster()">Mesajı Aç 💌</button>

  <div id="mesaj">
    Yollarımın sonu hep senin kapına çıkıyor…<br>
    İyi ki sevgilimsin yavrum 💘
  </div>
</div>

<!-- Müzik -->
<audio autoplay loop>
  <source src="muzik.mp3" type="audio/mpeg">
</audio>

<script>
function goster() {
  document.getElementById("mesaj").style.display = "block";
}

setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
